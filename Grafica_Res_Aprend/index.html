<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Poverty Dimensions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f4f7ff;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            position: relative;
        }

        /* ============================================ */
        /* SECCIÓN */
        /* ============================================ */

        .section {
            display: grid;
            grid-template-columns: 240px 60px 1fr;
            align-items: center;
            margin: 50px 0;
            position: relative;
        }

        /* ============================================ */
        /* LEFT CARD */
        /* ============================================ */

        .left-card {
            background: #001048;
            color: white;
            border-radius: 14px;
            padding: 22px 20px;
            text-align: center;
            box-shadow: 0 12px 28px rgba(0, 16, 72, .15);
            opacity: 0;
            transform: translateX(-100px);
            transition: 0.9s;
        }

        .section.show .left-card {
            opacity: 1;
            transform: translateX(0);
        }

        .left-card svg {
            width: 48px;
            height: 48px;
            margin-bottom: 10px;
            fill: none;
            stroke: white;
            stroke-width: 2;
        }

        .left-card h2 {
            font-size: 24px;
            font-weight: 700;
            line-height: 1.1;
        }

        /* ============================================ */
        /* CENTRO - LÍNEA */
        /* ============================================ */

        .middle {
            position: relative;
            height: 100%;
            display: flex;
            justify-content: center;
        }

        .line {
            width: 8px;
            background: #c8d0df;
            height: 0%;
            border-radius: 20px;
            transition: 1.5s ease;
        }

        .section.show .line {
            height: 100%;
        }

        /* ============================================ */
        /* RIGHT - ITEMS CON COLORES */
        /* ============================================ */

        .right {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Health items - Azul oscuro #001356 */
        .item1 {
            background: #001356;
            color: white;
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            position: relative;
            opacity: 0;
            transform: translateX(100px);
            transition: 0.7s;
            box-shadow: 0 10px 24px rgba(0, 16, 72, .12);
        }

        /* Education items - Azul medio #3348A4 */
        .item2 {
            background: #3348A4;
            color: white;
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            position: relative;
            opacity: 0;
            transform: translateX(100px);
            transition: 0.7s;
            box-shadow: 0 10px 24px rgba(0, 16, 72, .12);
        }

        /* Living items - Azul claro #336BA3 */
        .item3 {
            background: #336BA3;
            color: white;
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            position: relative;
            opacity: 0;
            transform: translateX(100px);
            transition: 0.7s;
            box-shadow: 0 10px 24px rgba(0, 16, 72, .12);
        }

        /* Mostrar todos los items al hacer scroll */
        .section.show .item1,
        .section.show .item2,
        .section.show .item3 {
            opacity: 1;
            transform: translateX(0);
        }

        /* Retrasos por posición */
        .section.show .item1:nth-child(1),
        .section.show .item2:nth-child(1),
        .section.show .item3:nth-child(1) {
            transition-delay: .2s;
        }

        .section.show .item1:nth-child(2),
        .section.show .item2:nth-child(2),
        .section.show .item3:nth-child(2) {
            transition-delay: .35s;
        }

        .section.show .item3:nth-child(3) {
            transition-delay: .5s;
        }

        .section.show .item3:nth-child(4) {
            transition-delay: .65s;
        }

        .section.show .item3:nth-child(5) {
            transition-delay: .8s;
        }

        .section.show .item3:nth-child(6) {
            transition-delay: .95s;
        }

        /* Línea conectora */
        .item1::before,
        .item2::before,
        .item3::before {
            content: "";
            position: absolute;
            left: -40px;
            top: 50%;
            width: 40px;
            height: 6px;
            background: #c8d0df;
            transform: translateY(-50%);
        }

        /* ============================================ */
        /* HOVER */
        /* ============================================ */

        .left-card:hover {
            transform: translateY(-4px);
        }

        .item1:hover,
        .item2:hover,
        .item3:hover {
            transform: translateX(-6px);
            background: #001048;
        }

        /* ============================================ */
        /* RESPONSIVE */
        /* ============================================ */

        @media(max-width: 820px) {
            .section {
                grid-template-columns: 1fr;
                gap: 18px;
                margin: 35px 0;
            }

            .middle {
                display: none;
            }

            .item1::before,
            .item2::before,
            .item3::before {
                display: none;
            }

            .left-card {
                transform: translateY(40px);
                padding: 18px 16px;
            }

            .left-card svg {
                width: 40px;
                height: 40px;
            }

            .left-card h2 {
                font-size: 20px;
            }

            .section.show .left-card {
                transform: translateY(0);
            }

            .item1,
            .item2,
            .item3 {
                transform: translateY(30px);
                font-size: 14px;
                padding: 10px 16px;
            }

            .section.show .item1,
            .section.show .item2,
            .section.show .item3 {
                transform: translateY(0);
            }
        }

        @media(max-width: 480px) {
            body {
                padding: 24px 12px;
            }

            .left-card {
                padding: 14px 12px;
                border-radius: 12px;
            }

            .left-card svg {
                width: 32px;
                height: 32px;
                margin-bottom: 6px;
            }

            .left-card h2 {
                font-size: 17px;
            }

            .item1,
            .item2,
            .item3 {
                font-size: 12px;
                padding: 8px 14px;
                border-radius: 10px;
            }

            .section {
                margin: 28px 0;
                gap: 14px;
            }
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: #f0f2f7;
        }

        ::-webkit-scrollbar-thumb {
            background: #c8d0df;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3348A4;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- HEALTH -->
        <div class="section">
            <div class="left-card">
                <svg viewBox="0 0 24 24">
                    <path d="M12 5v14M5 12h14" />
                </svg>
                <h2>Health</h2>
            </div>
            <div class="middle">
                <div class="line"></div>
            </div>
            <div class="right">
                <div class="item1">Nutrition</div>
                <div class="item1">Child Mortality</div>
            </div>
        </div>

        <!-- EDUCATION -->
        <div class="section">
            <div class="left-card" style="background:#3348A4;">
                <svg viewBox="0 0 24 24">
                    <path d="M3 5l9-2 9 2v14l-9-2-9 2z" />
                    <path d="M12 3v17" />
                </svg>
                <h2>Education</h2>
            </div>
            <div class="middle">
                <div class="line"></div>
            </div>
            <div class="right">
                <div class="item2">Years of Schooling</div>
                <div class="item2">School Attendance</div>
            </div>
        </div>

        <!-- LIVING -->
        <div class="section">
            <div class="left-card" style="background:#3b6fa9;">
                <svg viewBox="0 0 24 24">
                    <path d="M3 11l9-7 9 7" />
                    <path d="M5 10v10h14V10" />
                </svg>
                <h2>Living Standard</h2>
            </div>
            <div class="middle">
                <div class="line"></div>
            </div>
            <div class="right">
                <div class="item3">Cooking Fuel</div>
                <div class="item3">Sanitation</div>
                <div class="item3">Drinking Water</div>
                <div class="item3">Electricity</div>
                <div class="item3">Flooring</div>
                <div class="item3">Assets</div>
            </div>
        </div>

    </div>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add("show");
                }
            });
        }, { threshold: .35 });

        document.querySelectorAll(".section").forEach(section => {
            observer.observe(section);
        });
    </script>

</body>

</html>
