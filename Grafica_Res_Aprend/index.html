<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Interactive Poverty Dimensions</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#f4f7ff;
padding:80px 20px;
}

.container{

max-width:1200px;
margin:auto;
position:relative;

}

.section{

display:grid;
grid-template-columns:330px 90px 1fr;
align-items:center;
margin:90px 0;
position:relative;

}

/* LEFT CARD */

.left-card{

background:#001048;
color:white;
border-radius:18px;
padding:35px;
text-align:center;
box-shadow:0 18px 35px rgba(0,16,72,.18);

opacity:0;
transform:translateX(-120px);
transition:1s;

}

.section.show .left-card{

opacity:1;
transform:translateX(0);

}

.left-card svg{

width:70px;
height:70px;
margin-bottom:15px;
fill:none;
stroke:white;
stroke-width:2;

}

.left-card h2{

font-size:34px;
font-weight:700;
line-height:1.1;

}

/* CENTER */

.middle{

position:relative;
height:100%;
display:flex;
justify-content:center;

}

.line{

width:12px;
background:#808080;
height:0%;
border-radius:20px;
transition:1.5s ease;

}

.section.show .line{

height:100%;

}

/* RIGHT */

.right{

display:flex;
flex-direction:column;
gap:18px;

}

.item{

background:#3348A4;
color:white;
padding:18px 25px;
border-radius:14px;
font-size:22px;
font-weight:600;

position:relative;

opacity:0;
transform:translateX(120px);

transition:.8s;

box-shadow:0 15px 30px rgba(0,16,72,.15);

}

.section.show .item{

opacity:1;
transform:translateX(0);

}

.section.show .item:nth-child(1){

transition-delay:.3s;

}

.section.show .item:nth-child(2){

transition-delay:.5s;

}

.section.show .item:nth-child(3){

transition-delay:.7s;

}

.section.show .item:nth-child(4){

transition-delay:.9s;

}

.section.show .item:nth-child(5){

transition-delay:1.1s;

}

.section.show .item:nth-child(6){

transition-delay:1.3s;

}

.item::before{

content:"";
position:absolute;
left:-50px;
top:50%;

width:50px;
height:8px;
background:#808080;
transform:translateY(-50%);

}

/* Hover */

.left-card:hover{

transform:translateY(-8px);

}

.item:hover{

transform:translateX(-8px);
background:#001048;

}

/* Responsive */

@media(max-width:900px){

.section{

grid-template-columns:1fr;
gap:30px;

}

.middle{

display:none;

}

.item::before{

display:none;

}

.left-card{

transform:translateY(60px);

}

.section.show .left-card{

transform:translateY(0);

}

.item{

transform:translateY(50px);

}

.section.show .item{

transform:translateY(0);

}

}

</style>
</head>
<body>

<div class="container">

<!-- HEALTH -->

<div class="section">

<div class="left-card">

<svg viewBox="0 0 24 24">
<path d="M12 5v14M5 12h14"/>
</svg>

<h2>Health</h2>

</div>

<div class="middle">

<div class="line"></div>

</div>

<div class="right">

<div class="item">Nutrition</div>

<div class="item">Child Mortality</div>

</div>

</div>

<!-- EDUCATION -->

<div class="section">

<div class="left-card" style="background:#3348A4;">

<svg viewBox="0 0 24 24">
<path d="M3 5l9-2 9 2v14l-9-2-9 2z"/>
<path d="M12 3v17"/>
</svg>

<h2>Education</h2>

</div>

<div class="middle">

<div class="line"></div>

</div>

<div class="right">

<div class="item">Years of Schooling</div>

<div class="item">School Attendance</div>

</div>

</div>

<!-- LIVING -->

<div class="section">

<div class="left-card" style="background:#3b6fa9;">

<svg viewBox="0 0 24 24">
<path d="M3 11l9-7 9 7"/>
<path d="M5 10v10h14V10"/>
</svg>

<h2>Living Standard</h2>

</div>

<div class="middle">

<div class="line"></div>

</div>

<div class="right">

<div class="item">Cooking Fuel</div>

<div class="item">Sanitation</div>

<div class="item">Drinking Water</div>

<div class="item">Electricity</div>

<div class="item">Flooring</div>

<div class="item">Assets</div>

</div>

</div>

</div>

<script>

const observer=new IntersectionObserver((entries)=>{

entries.forEach(entry=>{

if(entry.isIntersecting){

entry.target.classList.add("show");

}

});

},{threshold:.35});

document.querySelectorAll(".section").forEach(section=>{

observer.observe(section);

});

</script>

</body>
</html>
